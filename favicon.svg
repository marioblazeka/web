<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <!-- Pozadina -->
  <rect width="180" height="180" fill="#00ff99" rx="20"/>
  
  <!-- Vanjski okvir -->
  <rect width="180" height="180" fill="none" stroke="#000" stroke-width="3" rx="20"/>
  
  <!-- Glavna slova "MB" -->
  <text x="90" y="100" font-size="70" font-weight="bold" text-anchor="middle" fill="#000" font-family="Arial, sans-serif">MB</text>
  
  <!-- Dekorativni elementi -->
  <circle cx="30" cy="30" r="8" fill="#000"/>
  <circle cx="150" cy="150" r="8" fill="#000"/>
  <line x1="15" y1="165" x2="165" y2="165" stroke="#000" stroke-width="2"/>
</svg>
